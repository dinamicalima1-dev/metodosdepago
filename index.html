<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Métodos de Pago</title>

<style>
body{
    font-family:  Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo img{
    max-width:180px;
}

h1{
    text-align:center;
    color:#d32f2f;
}

.card{
    background:#fafafa;
    border:1px solid #eee;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
}

.numero{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

button{
    width:100%;
    background:#d32f2f;
    color:#fff;
    border:none;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    opacity:.9;
}

.mensaje{
    text-align:center;
    color:green;
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <!-- Reemplaza por tu logo -->
        <img src="logo.png" alt="Logo">
    </div>

    <h1>Métodos de Pago</h1>

    <div class="card">
        <p><strong>Yape</strong></p>
        <div class="numero">987 654 321</div>
        <button onclick="copiarTexto('987654321')">
            Copiar número
        </button>
    </div>

    <div class="card">
        <p><strong>CCI</strong></p>
        <div class="numero">00212345678912345678</div>
        <button onclick="copiarTexto('00212345678912345678')">
            Copiar CCI
        </button>
    </div>

    <div class="card">
        <a href="https://wa.me/51987654321">
            <button>
                WhatsApp
            </button>
        </a>
    </div>

    <div id="mensaje" class="mensaje"></div>

</div>

<script>
function copiarTexto(texto) {

    navigator.clipboard.writeText(texto);

    document.getElementById("mensaje").innerHTML =
    "✅ Información copiada correctamente";

    setTimeout(() => {
        document.getElementById("mensaje").innerHTML = "";
    }, 2500);
}
</script>

</body>
</html>
